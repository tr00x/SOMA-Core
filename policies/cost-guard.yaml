version: "1"
policies:
  - name: "token-budget"
    when:
      - field: "token_usage"
        op: ">="
        value: 0.8
    do:
      action: "warn"
      message: "Token usage at 80%+ of budget"
  - name: "hard-cost-cap"
    when:
      - field: "cost"
        op: ">="
        value: 10.0
    do:
      action: "block"
      message: "Hard cost cap of $10 reached"
