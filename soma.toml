[soma]
version = "0.3.0"
store = "~/.soma/state.json"
profile = "claude-code"
mode = "reflex"

[budget]
tokens = 1000000
cost_usd = 50.0

[hooks]
verbosity = "normal"
validate_python = true
validate_js = true
lint_python = true
predict = true
fingerprint = true
quality = true
task_tracking = true
stale_timeout = 1800

[agents.claude-code]
autonomy = "human_on_the_loop"
sensitivity = "relaxed"
tools = [
    "Bash",
    "Edit",
    "Read",
    "Write",
    "Grep",
    "Glob",
    "Agent",
    "WebSearch",
    "WebFetch",
    "Skill",
    "NotebookEdit",
]

[thresholds]
guide = 0.4
warn = 0.6
block = 0.8

[weights]
uncertainty = 1.2
drift = 1.5
error_rate = 2.5
cost = 1.0
token_usage = 0.6

[graph]
damping = 0.6
trust_decay_rate = 0.03
trust_recovery_rate = 0.04

[vitals]
goal_coherence_threshold = 0.35
goal_coherence_warmup_actions = 5
baseline_integrity_error_ratio = 2.0
baseline_integrity_min_error_rate = 0.2
baseline_integrity_min_samples = 10
