<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMA — Behavioral Monitoring</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        soma: {
          bg: '#0a0a0a',
          card: '#111111',
          border: '#1e1e1e',
          pink: '#ff2d78',
          'pink-light': '#ff6ba6',
          success: '#00ff88',
          warning: '#ffaa00',
          error: '#ff4444',
        }
      },
      fontFamily: {
        mono: ["'SF Mono'", "'Cascadia Code'", "'Fira Code'", "'Consolas'", 'monospace'],
      }
    }
  }
}
</script>
<style>
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .animate-pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
  .pressure-bar-gradient {
    background: linear-gradient(90deg, #00ff88 0%, #ffaa00 40%, #ff8c00 65%, #ff4444 100%);
  }
</style>
</head>
<body class="bg-soma-bg text-gray-200 font-sans min-h-screen" x-data="dashboard">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-soma-bg border-b border-soma-border flex items-center justify-between px-6 py-3">
    <div class="flex items-center gap-3">
      <span class="text-2xl font-bold tracking-[0.3em] text-soma-pink">SOMA</span>
      <span class="text-sm text-gray-500 hidden sm:inline">Behavioral Monitoring</span>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-gray-400 font-mono text-sm" x-text="clock"></span>
      <span class="flex items-center gap-2 text-xs font-medium font-mono px-3 py-1 rounded-full"
            :class="connected
              ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20'
              : 'bg-red-500/10 text-red-400 border border-red-500/20'">
        <span class="w-2 h-2 rounded-full animate-pulse-dot"
              :class="connected ? 'bg-emerald-400 shadow-[0_0_6px_rgba(0,255,136,0.6)]' : 'bg-red-400 shadow-[0_0_6px_rgba(255,68,68,0.6)]'"></span>
        <span x-text="connected ? 'live' : 'offline'"></span>
      </span>
    </div>
  </header>

  <!-- Agent Cards -->
  <section class="p-6">
    <div class="flex flex-wrap gap-4">
      <template x-if="agents.length === 0">
        <div class="text-gray-500 text-sm italic py-8 w-full text-center">Waiting for agent data...</div>
      </template>
      <template x-for="agent in agents" :key="agent.agent_id">
        <div class="bg-soma-card rounded-xl p-5 border border-soma-border hover:border-soma-pink/30 transition cursor-pointer min-w-[280px] flex-1 max-w-md"
             :class="selectedAgent && selectedAgent.agent_id === agent.agent_id ? 'border-soma-pink shadow-[0_0_15px_rgba(255,45,120,0.15)]' : ''"
             @click="selectAgent(agent)">

          <!-- Header row -->
          <div class="flex items-center justify-between mb-3">
            <span class="font-mono font-semibold text-white text-sm" x-text="stripPrefix(agent.agent_id)"></span>
            <span class="rounded-full px-3 py-0.5 text-xs font-bold uppercase"
                  :class="modeBadgeClass(agent.level || agent.mode)">
              <span x-text="modeLabel(agent.level || agent.mode)"></span>
            </span>
          </div>

          <!-- Pressure -->
          <div class="mb-4">
            <div class="text-3xl font-mono font-bold" :style="'color:' + pressureColor(agent.pressure || 0)">
              <span x-text="pctFmt(agent.pressure_pct != null ? agent.pressure_pct : (agent.pressure || 0) * 100)"></span><span class="text-lg">%</span>
            </div>
            <div class="mt-1.5 h-1.5 rounded-full bg-white/5 overflow-hidden">
              <div class="h-full rounded-full pressure-bar-gradient transition-all duration-500"
                   :style="'width:' + Math.min(100, Math.max(0, agent.pressure_pct != null ? agent.pressure_pct : (agent.pressure || 0) * 100)) + '%'"></div>
            </div>
          </div>

          <!-- Vitals grid -->
          <div class="grid grid-cols-3 gap-x-4 gap-y-2 mb-3">
            <template x-for="v in vitalsList(agent)" :key="v.label">
              <div>
                <div class="text-[10px] text-gray-500 uppercase tracking-wider" x-text="v.label"></div>
                <div class="text-sm font-mono" x-text="v.value"></div>
              </div>
            </template>
          </div>

          <!-- Footer -->
          <div class="text-xs text-gray-500 pt-2 border-t border-soma-border">
            <span x-text="(agent.action_count || 0) + ' actions'"></span>
            <span class="mx-1">&middot;</span>
            <span>Quality </span>
            <span class="font-bold" :class="gradeColor(agent.quality_grade)" x-text="(agent.quality_grade || '--').toString().toUpperCase()"></span>
          </div>
        </div>
      </template>
    </div>
  </section>

  <!-- Main Content: Chart + Findings -->
  <section class="grid grid-cols-1 lg:grid-cols-3 gap-4 px-6">

    <!-- Pressure Chart -->
    <div class="lg:col-span-2 bg-soma-card rounded-xl p-5 border border-soma-border">
      <div class="flex items-center justify-between mb-3 cursor-pointer" @click="toggleSection('chart')">
        <div class="flex items-center gap-2">
          <i :data-lucide="expandedSections.chart ? 'chevron-down' : 'chevron-right'" class="w-4 h-4 text-gray-500"></i>
          <h3 class="text-sm font-semibold text-white">
            Pressure Trajectory
            <span x-show="selectedAgent" class="text-gray-400">&mdash; #<span x-text="selectedAgent ? stripPrefix(selectedAgent.agent_id) : ''"></span></span>
          </h3>
        </div>
        <div class="bg-soma-pink/10 text-soma-pink-light text-xs px-2 py-1 rounded hidden sm:block">Click and drag to zoom</div>
      </div>
      <div x-show="expandedSections.chart" x-transition>
        <canvas id="pressureChart" class="w-full" style="height:250px"></canvas>
      </div>
    </div>

    <!-- Findings -->
    <div class="bg-soma-card rounded-xl p-5 border border-soma-border">
      <h3 class="text-sm font-semibold text-white mb-3 flex items-center gap-2">
        <span class="w-0.5 h-4 bg-soma-pink rounded"></span>
        Findings
      </h3>
      <div class="space-y-2 max-h-72 overflow-y-auto">
        <template x-if="findings.length === 0">
          <div class="text-soma-success text-sm py-4 text-center italic">No findings — system nominal</div>
        </template>
        <template x-for="(f, i) in findings" :key="i">
          <div class="p-3 rounded-lg bg-white/[0.02] border-l-4 text-sm"
               :class="findingBorderClass(f)">
            <div class="text-xs font-bold uppercase tracking-wider mb-1" :class="findingTextClass(f)" x-text="f.priority || f.severity || 'info'"></div>
            <div class="text-gray-300" x-text="f.message || f.description || f.title || ''"></div>
            <div x-show="f.action" class="text-gray-500 text-xs mt-1" x-text="f.action || ''"></div>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- Actions & Audit Row -->
  <section class="grid grid-cols-1 lg:grid-cols-2 gap-4 px-6 mt-4">

    <!-- Recent Actions -->
    <div class="bg-soma-card rounded-xl p-5 border border-soma-border">
      <div class="flex items-center justify-between mb-3 cursor-pointer" @click="toggleSection('actions')">
        <div class="flex items-center gap-2">
          <i :data-lucide="expandedSections.actions ? 'chevron-down' : 'chevron-right'" class="w-4 h-4 text-gray-500"></i>
          <h3 class="text-sm font-semibold text-white">Recent Actions</h3>
        </div>
        <span class="text-xs text-gray-500" x-text="actions.length + ' total'"></span>
      </div>
      <div x-show="expandedSections.actions" x-transition>
        <div class="overflow-y-auto" :style="actionsExpanded ? 'max-height:500px' : 'max-height:280px'">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-[10px] text-gray-500 uppercase tracking-wider">
                <th class="text-left py-2 px-2">Tool</th>
                <th class="text-left py-2 px-1">Status</th>
                <th class="text-left py-2 px-1">File</th>
                <th class="text-right py-2 px-2">Time</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(a, i) in actions.slice(0, actionsExpanded ? 20 : 8)" :key="i">
                <tr class="font-mono text-xs" :class="i % 2 === 1 ? 'bg-white/[0.02]' : ''">
                  <td class="py-1.5 px-2">
                    <span x-text="toolEmoji(a.tool || a.tool_name)"></span>
                    <span class="ml-1" x-text="a.tool || a.tool_name || '--'"></span>
                  </td>
                  <td class="py-1.5 px-1">
                    <span class="inline-block w-2 h-2 rounded-full mr-1" :class="a.error ? 'bg-red-400' : 'bg-emerald-400'"></span>
                  </td>
                  <td class="py-1.5 px-1 text-gray-400 max-w-[150px] truncate" x-text="a.file || ''"></td>
                  <td class="py-1.5 px-2 text-right text-gray-500" x-text="a.ago || a.time_fmt || ''"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <button x-show="actions.length > 8" @click="actionsExpanded = !actionsExpanded"
                class="text-xs text-soma-pink hover:text-soma-pink-light mt-2 transition">
          <span x-text="actionsExpanded ? 'Show less' : 'Show more'"></span>
        </button>
      </div>
    </div>

    <!-- Audit Log -->
    <div class="bg-soma-card rounded-xl p-5 border border-soma-border">
      <div class="flex items-center justify-between mb-3 cursor-pointer" @click="toggleSection('audit')">
        <div class="flex items-center gap-2">
          <i :data-lucide="expandedSections.audit ? 'chevron-down' : 'chevron-right'" class="w-4 h-4 text-gray-500"></i>
          <h3 class="text-sm font-semibold text-white">Audit Log</h3>
        </div>
      </div>
      <div x-show="expandedSections.audit" x-transition>
        <div class="max-h-96 overflow-y-auto space-y-0.5 font-mono text-xs">
          <template x-if="audit.length === 0">
            <div class="text-gray-500 text-center py-4 italic">No entries</div>
          </template>
          <template x-for="(entry, i) in audit" :key="i">
            <div class="flex gap-2 px-2 py-1 rounded"
                 :class="entry.error ? 'bg-red-500/10' : (i % 2 === 1 ? 'bg-white/[0.02]' : '')">
              <span class="text-gray-600 shrink-0" x-text="'[' + (entry.time_fmt || '--:--:--') + ']'"></span>
              <span class="text-soma-pink-light shrink-0" x-text="entry.agent_id || ''"></span>
              <span class="text-soma-pink shrink-0" x-text="entry.tool_name || ''"></span>
              <span class="text-gray-400" x-text="fmtPct(entry.pressure)"></span>
              <span class="font-bold shrink-0"
                    :class="modeBadgeTextClass(entry.mode)" x-text="modeLabel(entry.mode)"></span>
            </div>
          </template>
        </div>
      </div>
    </div>
  </section>

  <!-- Bottom Row: Sessions + Config -->
  <section class="grid grid-cols-1 lg:grid-cols-2 gap-4 px-6 mt-4 pb-8">

    <!-- Session History -->
    <div class="bg-soma-card rounded-xl p-5 border border-soma-border">
      <div class="flex items-center justify-between mb-3 cursor-pointer" @click="toggleSection('sessions')">
        <div class="flex items-center gap-2">
          <i :data-lucide="expandedSections.sessions ? 'chevron-down' : 'chevron-right'" class="w-4 h-4 text-gray-500"></i>
          <h3 class="text-sm font-semibold text-white">Session History</h3>
        </div>
      </div>
      <div x-show="expandedSections.sessions" x-transition>
        <table class="w-full text-sm">
          <thead>
            <tr class="text-[10px] text-gray-500 uppercase tracking-wider">
              <th class="text-left py-2 px-2">Agent</th>
              <th class="text-left py-2 px-1">Duration</th>
              <th class="text-left py-2 px-1">Actions</th>
              <th class="text-left py-2 px-1">Max Pressure</th>
              <th class="text-right py-2 px-2">Errors</th>
            </tr>
          </thead>
          <tbody>
            <template x-if="sessions.length === 0">
              <tr><td colspan="5" class="text-center text-gray-500 py-4 italic">No sessions</td></tr>
            </template>
            <template x-for="(s, i) in sessions" :key="i">
              <tr class="font-mono text-xs" :class="i % 2 === 1 ? 'bg-white/[0.02]' : ''">
                <td class="py-1.5 px-2" x-text="s.agent_id || '--'"></td>
                <td class="py-1.5 px-1" x-text="s.duration_fmt || '--'"></td>
                <td class="py-1.5 px-1" x-text="s.action_count || 0"></td>
                <td class="py-1.5 px-1" :style="'color:' + pressureColor((s.max_pressure_pct || 0) / 100)">
                  <span x-text="(s.max_pressure_pct != null ? s.max_pressure_pct.toFixed(1) : '--') + '%'"></span>
                </td>
                <td class="py-1.5 px-2 text-right" :class="(s.error_count || 0) > 0 ? 'text-red-400' : 'text-gray-500'" x-text="s.error_count || 0"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Configuration -->
    <div class="bg-soma-card rounded-xl p-5 border border-soma-border">
      <div class="flex items-center justify-between mb-3 cursor-pointer" @click="toggleSection('config')">
        <div class="flex items-center gap-2">
          <i :data-lucide="expandedSections.config ? 'chevron-down' : 'chevron-right'" class="w-4 h-4 text-gray-500"></i>
          <h3 class="text-sm font-semibold text-white">Configuration</h3>
          <span class="text-xs text-gray-500">from soma.toml</span>
        </div>
      </div>
      <div x-show="expandedSections.config" x-transition class="space-y-4">

        <!-- Thresholds -->
        <template x-if="config.thresholds">
          <div>
            <div class="text-[10px] text-gray-500 uppercase tracking-wider mb-2">Thresholds</div>
            <div class="space-y-2">
              <template x-for="key in ['guide', 'warn', 'block']" :key="key">
                <div class="flex items-center gap-3" x-show="config.thresholds[key] != null">
                  <span class="text-xs font-mono w-12 text-gray-400 uppercase" x-text="key"></span>
                  <div class="flex-1 h-2 bg-white/5 rounded-full overflow-hidden">
                    <div class="h-full rounded-full transition-all"
                         :class="key === 'guide' ? 'bg-yellow-500' : key === 'warn' ? 'bg-orange-500' : 'bg-red-500'"
                         :style="'width:' + ((config.thresholds[key] || 0) * 100) + '%'"></div>
                  </div>
                  <span class="text-xs font-mono text-gray-300 w-10 text-right" x-text="(config.thresholds[key] || 0).toFixed(2)"></span>
                </div>
              </template>
            </div>
            <div class="bg-soma-pink/10 text-soma-pink-light text-xs p-2 rounded mt-2">Pressure above guide threshold triggers soft suggestions</div>
          </div>
        </template>

        <!-- Weights -->
        <template x-if="config.weights">
          <div>
            <div class="text-[10px] text-gray-500 uppercase tracking-wider mb-2">Signal Weights</div>
            <div class="space-y-1.5">
              <template x-for="(val, key) in config.weights" :key="key">
                <div class="flex items-center gap-2">
                  <span class="text-[10px] font-mono w-20 text-gray-500 truncate" x-text="key"></span>
                  <div class="flex-1 h-1.5 bg-white/5 rounded-full overflow-hidden">
                    <div class="h-full rounded-full bg-soma-pink/60" :style="'width:' + Math.min(100, (val / 2.0) * 100) + '%'"></div>
                  </div>
                  <span class="text-[10px] font-mono text-gray-400 w-8 text-right" x-text="val.toFixed(1)"></span>
                </div>
              </template>
            </div>
            <div class="bg-soma-pink/10 text-soma-pink-light text-xs p-2 rounded mt-2">Higher weight = more influence on aggregate pressure</div>
          </div>
        </template>

        <!-- Hooks -->
        <template x-if="config.hooks">
          <div>
            <div class="text-[10px] text-gray-500 uppercase tracking-wider mb-2">Hooks</div>
            <div class="flex flex-wrap gap-2">
              <template x-for="(val, key) in config.hooks" :key="key">
                <span class="text-xs font-mono px-2 py-0.5 rounded-full"
                      :class="val ? 'bg-emerald-500/15 text-emerald-400 border border-emerald-500/20' : 'bg-gray-800 text-gray-500 border border-gray-700'">
                  <span x-text="key"></span>
                </span>
              </template>
            </div>
          </div>
        </template>

        <!-- Budget -->
        <template x-if="config.budget">
          <div>
            <div class="text-[10px] text-gray-500 uppercase tracking-wider mb-2">Budget</div>
            <div class="grid grid-cols-2 gap-2 text-xs font-mono">
              <template x-for="(val, key) in config.budget" :key="key">
                <div class="bg-white/[0.03] rounded p-2">
                  <div class="text-gray-500 text-[10px] uppercase" x-text="key"></div>
                  <div class="text-gray-300" x-text="typeof val === 'number' ? val.toLocaleString() : val"></div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Mirror -->
        <template x-if="config.mirror">
          <div>
            <div class="text-[10px] text-gray-500 uppercase tracking-wider mb-2">Mirror</div>
            <div class="grid grid-cols-2 gap-2 text-xs font-mono">
              <template x-for="(val, key) in config.mirror" :key="key">
                <div class="bg-white/[0.03] rounded p-2">
                  <div class="text-gray-500 text-[10px] uppercase" x-text="key"></div>
                  <div class="text-gray-300" x-text="String(val)"></div>
                </div>
              </template>
            </div>
          </div>
        </template>

      </div>
    </div>
  </section>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('dashboard', () => ({
    agents: [],
    selectedAgent: null,
    audit: [],
    sessions: [],
    config: {},
    trajectory: [],
    actions: [],
    quality: {},
    findings: [],
    fingerprints: {},
    connected: false,
    clock: '--:--:--',
    actionsExpanded: false,
    expandedSections: { chart: true, actions: false, audit: true, sessions: false, config: false },
    chart: null,
    _clockInterval: null,
    _pollInterval: null,

    async init() {
      this.updateClock();
      this._clockInterval = setInterval(() => this.updateClock(), 1000);
      await this.fetchOverview();
      await this.fetchConfig();
      this._pollInterval = setInterval(() => this.fetchOverview(), 2000);
      this.$nextTick(() => lucide.createIcons());
    },

    updateClock() {
      const now = new Date();
      this.clock = [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(n => String(n).padStart(2, '0')).join(':');
    },

    async fetchOverview() {
      try {
        const r = await fetch('/api/overview');
        if (!r.ok) throw new Error(r.status);
        const data = await r.json();
        this.connected = true;
        this.agents = data.agents || [];
        this.audit = (data.audit || []).slice(0, 200);
        this.sessions = data.sessions || [];
        this.findings = data.findings || [];

        // Auto-select first agent if none selected
        if (!this.selectedAgent && this.agents.length > 0) {
          await this.selectAgent(this.agents[0]);
        } else if (this.selectedAgent) {
          // Refresh selected agent data
          const current = this.agents.find(a => a.agent_id === this.selectedAgent.agent_id);
          if (current) {
            this.selectedAgent = current;
            await this.fetchTrajectory(current.agent_id);
            await this.fetchActions(current.agent_id);
          }
        }
        this.$nextTick(() => lucide.createIcons());
      } catch (e) {
        this.connected = false;
      }
    },

    async selectAgent(agent) {
      this.selectedAgent = agent;
      this.actionsExpanded = false;
      if (!this.expandedSections.actions) this.expandedSections.actions = true;
      await this.fetchTrajectory(agent.agent_id);
      await this.fetchActions(agent.agent_id);
      await this.fetchQuality(agent.agent_id);
    },

    async fetchTrajectory(id) {
      try {
        const r = await fetch('/api/agent/' + encodeURIComponent(id) + '/trajectory');
        if (r.ok) {
          const data = await r.json();
          this.trajectory = Array.isArray(data) ? data : (data.trajectory || data.data || []);
          this.updateChart();
        }
      } catch (e) {}
    },

    async fetchActions(id) {
      try {
        const r = await fetch('/api/agent/' + encodeURIComponent(id) + '/actions');
        if (r.ok) {
          const data = await r.json();
          this.actions = Array.isArray(data) ? data : (data.actions || []);
        }
      } catch (e) {}
    },

    async fetchQuality(id) {
      try {
        const r = await fetch('/api/agent/' + encodeURIComponent(id) + '/quality');
        if (r.ok) {
          this.quality = await r.json();
        }
      } catch (e) {}
    },

    async fetchConfig() {
      try {
        const r = await fetch('/api/config');
        if (r.ok) {
          this.config = await r.json();
        }
      } catch (e) {}
    },

    toggleSection(name) {
      this.expandedSections[name] = !this.expandedSections[name];
      this.$nextTick(() => lucide.createIcons());
      if (name === 'chart' && this.expandedSections.chart) {
        this.$nextTick(() => this.updateChart());
      }
    },

    // Chart.js management
    updateChart() {
      const canvas = document.getElementById('pressureChart');
      if (!canvas) return;
      if (this.chart) {
        this.chart.destroy();
        this.chart = null;
      }
      if (!this.trajectory || this.trajectory.length === 0) return;

      const labels = this.trajectory.map((_, i) => '#' + (i + 1));
      const values = this.trajectory.map(v => typeof v === 'number' ? v : (v.pressure || 0));
      const lastIdx = values.length - 1;
      const lastColor = this.pressureColor(values[lastIdx] || 0);

      this.chart = new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: '#ff2d78',
            backgroundColor: 'rgba(255,45,120,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: values.map((_, i) => i === lastIdx ? 4 : 0),
            pointBackgroundColor: values.map((_, i) => i === lastIdx ? lastColor : 'transparent'),
            pointBorderColor: values.map((_, i) => i === lastIdx ? lastColor : 'transparent'),
            borderWidth: 2,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            annotation: undefined,
          },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.03)' },
              ticks: { color: '#444', font: { family: 'monospace', size: 10 }, maxTicksLimit: 10 },
            },
            y: {
              min: 0,
              max: 1,
              grid: { color: 'rgba(255,255,255,0.03)' },
              ticks: { color: '#444', font: { family: 'monospace', size: 10 }, stepSize: 0.2 },
            }
          }
        },
        plugins: [{
          id: 'thresholdLines',
          afterDraw(chart) {
            const ctx = chart.ctx;
            const yAxis = chart.scales.y;
            const xAxis = chart.scales.x;
            const thresholds = [
              { value: 0.40, label: 'GUIDE', color: '#ffaa00' },
              { value: 0.60, label: 'WARN', color: '#ff8c00' },
              { value: 0.80, label: 'BLOCK', color: '#ff4444' },
            ];
            thresholds.forEach(t => {
              const y = yAxis.getPixelForValue(t.value);
              ctx.save();
              ctx.beginPath();
              ctx.setLineDash([6, 4]);
              ctx.strokeStyle = t.color;
              ctx.globalAlpha = 0.4;
              ctx.lineWidth = 1;
              ctx.moveTo(xAxis.left, y);
              ctx.lineTo(xAxis.right, y);
              ctx.stroke();
              ctx.globalAlpha = 0.5;
              ctx.setLineDash([]);
              ctx.fillStyle = t.color;
              ctx.font = '9px system-ui';
              ctx.textAlign = 'right';
              ctx.fillText(t.label, xAxis.right - 4, y - 4);
              ctx.restore();
            });
          }
        }]
      });
    },

    // Helpers
    stripPrefix(id) {
      if (!id) return '';
      return id.replace(/^cc-/, '');
    },

    modeLabel(mode) {
      if (!mode) return 'OBSERVE';
      const m = String(mode).toUpperCase();
      if (m.includes('BLOCK')) return 'BLOCK';
      if (m.includes('WARN')) return 'WARN';
      if (m.includes('GUIDE')) return 'GUIDE';
      return 'OBSERVE';
    },

    modeBadgeClass(mode) {
      const m = this.modeLabel(mode);
      return {
        'OBSERVE': 'bg-emerald-500/20 text-emerald-400',
        'GUIDE': 'bg-yellow-500/20 text-yellow-400',
        'WARN': 'bg-orange-500/20 text-orange-400',
        'BLOCK': 'bg-pink-500/20 text-pink-400',
      }[m] || 'bg-emerald-500/20 text-emerald-400';
    },

    modeBadgeTextClass(mode) {
      const m = this.modeLabel(mode);
      return {
        'OBSERVE': 'text-emerald-400',
        'GUIDE': 'text-yellow-400',
        'WARN': 'text-orange-400',
        'BLOCK': 'text-pink-400',
      }[m] || 'text-emerald-400';
    },

    pressureColor(p) {
      if (p < 0.25) return '#00ff88';
      if (p < 0.50) return '#ffaa00';
      if (p < 0.75) return '#ff8c00';
      return '#ff4444';
    },

    pctFmt(v) {
      if (v == null || isNaN(v)) return '--';
      return Number(v).toFixed(1);
    },

    fmtPct(p) {
      if (p == null) return '';
      return (p * 100).toFixed(1) + '%';
    },

    vitalsList(agent) {
      const v = agent.vitals || {};
      return [
        { label: 'uncertainty', value: this.fmtVal(v.uncertainty) },
        { label: 'drift', value: this.fmtVal(v.drift) },
        { label: 'error rate', value: this.fmtVal(v.error_rate) },
        { label: 'cost', value: this.fmtVal(v.cost) },
        { label: 'tokens', value: v.token_usage != null ? v.token_usage.toLocaleString() : '--' },
        { label: 'coherence', value: this.fmtVal(v.coherence || v.goal_coherence) },
      ];
    },

    fmtVal(n) {
      if (n == null || isNaN(n)) return '--';
      return Number(n).toFixed(3);
    },

    gradeColor(grade) {
      if (!grade) return 'text-gray-500';
      const g = String(grade).toUpperCase()[0];
      return { A: 'text-soma-success', B: 'text-emerald-300', C: 'text-yellow-400', D: 'text-orange-400', F: 'text-red-400' }[g] || 'text-gray-500';
    },

    toolEmoji(tool) {
      if (!tool) return '';
      const map = { Read: '\u{1F4D6}', Edit: '\u270F\uFE0F', Write: '\u270D\uFE0F', Bash: '\u{1F527}', Grep: '\u{1F50D}', Glob: '\u{1F4C1}', Agent: '\u{1F916}', WebSearch: '\u{1F310}', WebFetch: '\u{1F310}' };
      return map[tool] || '';
    },

    findingBorderClass(f) {
      const p = (f.priority || f.severity || 'info').toLowerCase();
      if (p.includes('crit') || p.includes('high') || p.includes('error')) return 'border-red-500';
      if (p.includes('warn') || p.includes('med') || p.includes('important')) return 'border-orange-500';
      return 'border-blue-500';
    },

    findingTextClass(f) {
      const p = (f.priority || f.severity || 'info').toLowerCase();
      if (p.includes('crit') || p.includes('high') || p.includes('error')) return 'text-red-400';
      if (p.includes('warn') || p.includes('med') || p.includes('important')) return 'text-orange-400';
      return 'text-blue-400';
    },
  }));
});
</script>
</body>
</html>
