<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMA -- Behavioral Monitoring</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --card: #141414;
  --card-border: #1a1a1a;
  --pink: #ff2d78;
  --pink-light: #ff6ba6;
  --text: #e0e0e0;
  --text-muted: #666666;
  --success: #00ff88;
  --warning: #ffaa00;
  --error: #ff4444;
  --blue: #4488ff;
  --radius: 8px;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --font-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* Layout */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--card);
  border-bottom: 2px solid transparent;
  border-image: linear-gradient(90deg, var(--pink), var(--pink-light), transparent 80%) 1;
  flex-shrink: 0;
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-mark {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--pink-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 15px;
  color: #fff;
  box-shadow: 0 0 20px rgba(255, 45, 120, 0.4);
  flex-shrink: 0;
}

.logo-text {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 4px;
  color: #fff;
}

.logo-sub {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-left: 4px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.header-time {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 500;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
  animation: pulse 2s ease-in-out infinite;
  flex-shrink: 0;
}

.status-dot.warn { background: var(--warning); box-shadow: 0 0 8px rgba(255, 170, 0, 0.5); }
.status-dot.error { background: var(--error); box-shadow: 0 0 8px rgba(255, 68, 68, 0.5); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Main content */
main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 24px 32px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Section titles */
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.card:hover {
  border-color: #2a2a2a;
}

/* Row 1: Agent cards */
.agent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.agent-card {
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.agent-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--pink), var(--pink-light));
  opacity: 0;
  transition: opacity 0.2s;
}

.agent-card:hover::before { opacity: 1; }

.agent-card.selected {
  border-color: var(--pink);
  box-shadow: 0 0 24px rgba(255, 45, 120, 0.1);
}

.agent-card.selected::before { opacity: 1; }

.agent-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.agent-id {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}

.mode-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 12px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.mode-badge.observe { background: rgba(0, 255, 136, 0.12); color: var(--success); border: 1px solid rgba(0, 255, 136, 0.2); }
.mode-badge.guide { background: rgba(255, 170, 0, 0.12); color: var(--warning); border: 1px solid rgba(255, 170, 0, 0.2); }
.mode-badge.warn { background: rgba(255, 140, 0, 0.12); color: #ff8c00; border: 1px solid rgba(255, 140, 0, 0.2); }
.mode-badge.block { background: rgba(255, 68, 68, 0.12); color: var(--error); border: 1px solid rgba(255, 68, 68, 0.2); }

/* Pressure bar */
.pressure-bar-container {
  margin-bottom: 12px;
}

.pressure-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 5px;
}

.pressure-value {
  font-family: var(--font-mono);
  font-weight: 600;
}

.pressure-bar-track {
  height: 6px;
  background: #1e1e1e;
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.pressure-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease, background 0.6s ease, box-shadow 0.6s ease;
}

/* Vitals grid */
.vitals-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 16px;
  margin-bottom: 10px;
}

.vital-item {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}

.vital-label { color: var(--text-muted); }
.vital-value { font-family: var(--font-mono); font-weight: 500; }

.agent-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 10px;
  border-top: 1px solid #1e1e1e;
  font-size: 12px;
}

.action-count {
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.quality-grade {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 800;
  line-height: 1;
}

.grade-a { color: var(--success); text-shadow: 0 0 12px rgba(0, 255, 136, 0.3); }
.grade-b { color: #66ddaa; }
.grade-c { color: var(--warning); }
.grade-d { color: #ff8c00; }
.grade-f { color: var(--error); text-shadow: 0 0 12px rgba(255, 68, 68, 0.3); }

/* Row 2: Pressure chart + Findings */
.row-split {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
}

.chart-container { min-height: 260px; }

.chart-container svg {
  width: 100%;
  height: 220px;
  display: block;
}

.panel-title {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-title-accent {
  width: 3px;
  height: 14px;
  background: var(--pink);
  border-radius: 2px;
  flex-shrink: 0;
}

/* Findings */
.findings-list {
  max-height: 230px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.finding-item {
  padding: 10px 12px;
  background: #111;
  border-radius: 6px;
  border-left: 3px solid var(--text-muted);
  font-size: 12px;
  line-height: 1.4;
  transition: background 0.15s;
}

.finding-item:hover { background: #1a1a1a; }

.finding-item.critical { border-left-color: var(--error); }
.finding-item.important { border-left-color: var(--warning); }
.finding-item.info { border-left-color: var(--blue); }

.finding-priority {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.finding-priority.critical { color: var(--error); }
.finding-priority.important { color: var(--warning); }
.finding-priority.info { color: var(--blue); }

/* Row 3 + 4 */
.row-even {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* Tables */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table th {
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 8px;
  border-bottom: 1px solid #1e1e1e;
  position: sticky;
  top: 0;
  background: var(--card);
}

.data-table td {
  padding: 7px 8px;
  border-bottom: 1px solid #111;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.data-table tbody tr { transition: background 0.1s; }
.data-table tbody tr:hover { background: rgba(255, 45, 120, 0.03); }

.table-scroll {
  max-height: 200px;
  overflow-y: auto;
}

.status-ok { color: var(--success); }
.status-err { color: var(--error); }

/* Audit log */
.audit-log {
  max-height: 200px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.audit-entry {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 8px;
  background: #111;
  border-radius: 4px;
  color: var(--text-muted);
  display: flex;
  gap: 10px;
  transition: background 0.1s;
}

.audit-entry:hover { background: #1a1a1a; }

.audit-time { color: #444; white-space: nowrap; flex-shrink: 0; }
.audit-agent { color: var(--pink-light); white-space: nowrap; flex-shrink: 0; }
.audit-msg { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Patterns */
.pattern-list {
  max-height: 200px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.pattern-item {
  padding: 10px 12px;
  background: #111;
  border-radius: 6px;
  font-size: 12px;
  transition: background 0.15s;
}

.pattern-item:hover { background: #1a1a1a; }

.pattern-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.pattern-name {
  font-weight: 600;
  color: #fff;
}

.severity-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 10px;
}

.severity-high { background: rgba(255, 68, 68, 0.15); color: var(--error); }
.severity-medium { background: rgba(255, 170, 0, 0.15); color: var(--warning); }
.severity-low { background: rgba(0, 255, 136, 0.12); color: var(--success); }

.pattern-desc { color: var(--text-muted); line-height: 1.4; }

/* Empty state */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 13px;
  min-height: 80px;
  font-style: italic;
}

/* Connection status */
.conn-status {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 12px;
  font-weight: 500;
  font-family: var(--font-mono);
}

.conn-status.connected { background: rgba(0, 255, 136, 0.08); color: var(--success); border: 1px solid rgba(0, 255, 136, 0.15); }
.conn-status.disconnected { background: rgba(255, 68, 68, 0.08); color: var(--error); border: 1px solid rgba(255, 68, 68, 0.15); }
.conn-status.connecting { background: rgba(102, 102, 102, 0.08); color: var(--text-muted); border: 1px solid rgba(102, 102, 102, 0.15); }

/* Responsive */
@media (max-width: 900px) {
  .row-split, .row-even {
    grid-template-columns: 1fr;
  }
  main { padding: 12px 12px 20px; }
  header { padding: 10px 12px; }
}

@media (max-width: 600px) {
  .agent-grid {
    grid-template-columns: 1fr;
  }
  .logo-sub { display: none; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-mark">S</div>
      <span class="logo-text">SOMA</span>
      <span class="logo-sub">Behavioral Monitoring</span>
    </div>
    <div class="header-right">
      <span class="conn-status connecting" id="conn-status">connecting</span>
      <span class="header-time" id="clock"></span>
      <div class="status-indicator">
        <div class="status-dot" id="status-dot"></div>
        <span id="overall-status">Nominal</span>
      </div>
    </div>
  </header>

  <main>
    <!-- Row 1: Agent Cards -->
    <section>
      <div class="section-title">Monitored Agents</div>
      <div class="agent-grid" id="agent-grid">
        <div class="empty-state" style="grid-column:1/-1">Waiting for agent data...</div>
      </div>
    </section>

    <!-- Row 2: Pressure Chart + Findings -->
    <section class="row-split">
      <div class="card chart-container">
        <div class="panel-title">
          <span class="panel-title-accent"></span>
          <span id="chart-title">Pressure Trajectory</span>
        </div>
        <svg id="pressure-chart" viewBox="0 0 800 220" preserveAspectRatio="none"></svg>
      </div>
      <div class="card">
        <div class="panel-title">
          <span class="panel-title-accent"></span>
          <span>Findings</span>
        </div>
        <div class="findings-list" id="findings-list">
          <div class="empty-state">No findings</div>
        </div>
      </div>
    </section>

    <!-- Row 3: Recent Actions + Audit Log -->
    <section class="row-even">
      <div class="card">
        <div class="panel-title">
          <span class="panel-title-accent"></span>
          <span>Recent Actions</span>
        </div>
        <div class="table-scroll">
          <table class="data-table" id="actions-table">
            <thead>
              <tr><th>Tool</th><th>Status</th><th>Tokens</th><th>Time</th></tr>
            </thead>
            <tbody>
              <tr><td colspan="4" class="empty-state">No actions</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="panel-title">
          <span class="panel-title-accent"></span>
          <span>Audit Log</span>
        </div>
        <div class="audit-log" id="audit-log">
          <div class="empty-state">No entries</div>
        </div>
      </div>
    </section>

    <!-- Row 4: Sessions + Patterns -->
    <section class="row-even">
      <div class="card">
        <div class="panel-title">
          <span class="panel-title-accent"></span>
          <span>Session History</span>
        </div>
        <div class="table-scroll">
          <table class="data-table" id="sessions-table">
            <thead>
              <tr><th>Agent</th><th>Duration</th><th>Max Pressure</th><th>Errors</th></tr>
            </thead>
            <tbody>
              <tr><td colspan="4" class="empty-state">No sessions</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="panel-title">
          <span class="panel-title-accent"></span>
          <span>Detected Patterns</span>
        </div>
        <div class="pattern-list" id="pattern-list">
          <div class="empty-state">No patterns detected</div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
(function() {
  'use strict';

  // --- State ---
  var agents = [];
  var selectedAgentId = null;
  var trajectory = [];
  var connected = false;
  var fetchOk = false;

  // --- Utilities ---

  function esc(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  function fmt(n, digits) {
    if (n == null || isNaN(n)) return '--';
    return Number(n).toFixed(digits != null ? digits : 2);
  }

  function pressureColor(p) {
    if (p < 0.25) return '#00ff88';
    if (p < 0.50) return '#ffaa00';
    if (p < 0.75) return '#ff8c00';
    return '#ff4444';
  }

  function pressureGradient(p) {
    if (p < 0.25) return 'linear-gradient(90deg, #00cc66, #00ff88)';
    if (p < 0.50) return 'linear-gradient(90deg, #44dd88, #ffaa00)';
    if (p < 0.75) return 'linear-gradient(90deg, #ffaa00, #ff8c00)';
    return 'linear-gradient(90deg, #ff8c00, #ff4444)';
  }

  function modeClass(mode) {
    if (!mode) return 'observe';
    var m = String(mode).toLowerCase();
    if (m.includes('block') || m.includes('quarantine')) return 'block';
    if (m.includes('warn') || m.includes('degrade')) return 'warn';
    if (m.includes('guide') || m.includes('caution')) return 'guide';
    return 'observe';
  }

  function modeLabel(mode) {
    if (!mode) return 'OBSERVE';
    var m = String(mode).toUpperCase();
    if (m.includes('BLOCK') || m.includes('QUARANTINE')) return 'BLOCK';
    if (m.includes('WARN') || m.includes('DEGRADE')) return 'WARN';
    if (m.includes('GUIDE') || m.includes('CAUTION')) return 'GUIDE';
    return 'OBSERVE';
  }

  function gradeClass(g) {
    if (!g || g === '--') return '';
    var c = String(g).toUpperCase()[0];
    return { A: 'grade-a', B: 'grade-b', C: 'grade-c', D: 'grade-d', F: 'grade-f' }[c] || '';
  }

  function timeAgo(ts) {
    if (!ts) return '--';
    var d = typeof ts === 'number' ? (ts > 1e12 ? ts : ts * 1000) : Date.parse(ts);
    if (isNaN(d)) return '--';
    var sec = Math.floor((Date.now() - d) / 1000);
    if (sec < 0) sec = 0;
    if (sec < 5) return 'now';
    if (sec < 60) return sec + 's ago';
    if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
    return Math.floor(sec / 3600) + 'h ago';
  }

  function formatDuration(sec) {
    if (sec == null || isNaN(sec)) return '--';
    sec = Math.round(Number(sec));
    if (sec < 60) return sec + 's';
    if (sec < 3600) return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
    return Math.floor(sec / 3600) + 'h ' + Math.floor((sec % 3600) / 60) + 'm';
  }

  // --- Clock ---
  function updateClock() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2, '0');
    var m = String(now.getMinutes()).padStart(2, '0');
    var s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m + ':' + s;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // --- Connection ---
  function setConnected(ok) {
    connected = ok;
    var el = document.getElementById('conn-status');
    if (ok) {
      el.className = 'conn-status connected';
      el.textContent = 'connected';
    } else {
      el.className = 'conn-status disconnected';
      el.textContent = 'disconnected';
    }
  }

  // --- API ---
  async function api(path) {
    try {
      var r = await fetch(path);
      if (!r.ok) throw new Error(r.status);
      var data = await r.json();
      if (!fetchOk) { setConnected(true); fetchOk = true; }
      return data;
    } catch (e) {
      if (fetchOk) { setConnected(false); fetchOk = false; }
      return null;
    }
  }

  // --- Render: Agent Cards ---
  function renderAgents(list) {
    var grid = document.getElementById('agent-grid');
    if (!list || list.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No agents registered</div>';
      return;
    }

    grid.innerHTML = list.map(function(a) {
      var p = a.pressure != null ? a.pressure : 0;
      var pPct = Math.min(100, Math.max(0, p * 100));
      var mode = a.mode || a.response_mode || 'OBSERVE';
      var mc = modeClass(mode);
      var ml = modeLabel(mode);
      var sel = a.agent_id === selectedAgentId ? ' selected' : '';
      var v = a.vitals || {};
      var grade = a.quality_grade || a.grade || '--';
      var gc = gradeClass(grade);
      var actions = a.action_count != null ? a.action_count : '--';
      var pc = pressureColor(p);
      var pg = pressureGradient(p);

      return '<div class="card agent-card' + sel + '" data-agent="' + esc(a.agent_id) + '">' +
        '<div class="agent-header">' +
          '<span class="agent-id">' + esc(a.agent_id) + '</span>' +
          '<span class="mode-badge ' + mc + '">' + ml + '</span>' +
        '</div>' +
        '<div class="pressure-bar-container">' +
          '<div class="pressure-label">' +
            '<span>Pressure</span>' +
            '<span class="pressure-value" style="color:' + pc + '">' + fmt(pPct, 1) + '%</span>' +
          '</div>' +
          '<div class="pressure-bar-track">' +
            '<div class="pressure-bar-fill" style="width:' + pPct + '%;background:' + pg + ';box-shadow:0 0 12px ' + pc + '44"></div>' +
          '</div>' +
        '</div>' +
        '<div class="vitals-grid">' +
          '<div class="vital-item"><span class="vital-label">Uncertainty</span><span class="vital-value">' + fmt(v.uncertainty) + '</span></div>' +
          '<div class="vital-item"><span class="vital-label">Drift</span><span class="vital-value">' + fmt(v.drift) + '</span></div>' +
          '<div class="vital-item"><span class="vital-label">Error Rate</span><span class="vital-value">' + fmt(v.error_rate) + '</span></div>' +
          '<div class="vital-item"><span class="vital-label">Coherence</span><span class="vital-value">' + fmt(v.goal_coherence != null ? v.goal_coherence : v.coherence) + '</span></div>' +
        '</div>' +
        '<div class="agent-footer">' +
          '<span class="action-count">' + esc(actions) + ' actions</span>' +
          '<span class="quality-grade ' + gc + '">' + esc(String(grade).toUpperCase()) + '</span>' +
        '</div>' +
      '</div>';
    }).join('');

    grid.querySelectorAll('.agent-card').forEach(function(card) {
      card.addEventListener('click', function() {
        var id = card.dataset.agent;
        selectedAgentId = selectedAgentId === id ? null : id;
        renderAgents(agents);
        fetchAgentDetail();
      });
    });
  }

  // --- Render: SVG Pressure Chart ---
  function renderChart(data) {
    var svg = document.getElementById('pressure-chart');
    var titleEl = document.getElementById('chart-title');

    titleEl.textContent = selectedAgentId
      ? 'Pressure Trajectory \u2014 ' + selectedAgentId
      : 'Pressure Trajectory';

    if (!data || data.length === 0) {
      svg.innerHTML = '<text x="400" y="120" fill="#444" text-anchor="middle" font-size="13" font-family="system-ui, sans-serif">No trajectory data</text>';
      return;
    }

    var w = 800, h = 220;
    var padL = 44, padR = 12, padT = 16, padB = 28;
    var cw = w - padL - padR;
    var ch = h - padT - padB;
    var n = data.length;
    var xStep = n > 1 ? cw / (n - 1) : 0;

    var thresholds = [
      { y: 0.40, label: 'GUIDE', color: '#ffaa00' },
      { y: 0.60, label: 'WARN', color: '#ff8c00' },
      { y: 0.80, label: 'BLOCK', color: '#ff4444' }
    ];

    var parts = [];

    // Gradient defs
    parts.push('<defs>');
    parts.push('<linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">');
    parts.push('<stop offset="0%" stop-color="#ff2d78" stop-opacity="0.25"/>');
    parts.push('<stop offset="100%" stop-color="#ff2d78" stop-opacity="0"/>');
    parts.push('</linearGradient>');
    parts.push('</defs>');

    // Horizontal grid lines + Y labels
    for (var i = 0; i <= 5; i++) {
      var gy = padT + (ch * i / 5);
      var gv = (1 - i / 5).toFixed(1);
      parts.push('<line x1="' + padL + '" y1="' + gy + '" x2="' + (w - padR) + '" y2="' + gy + '" stroke="#1a1a1a" stroke-width="1"/>');
      parts.push('<text x="' + (padL - 8) + '" y="' + (gy + 4) + '" fill="#444" font-size="10" font-family="monospace" text-anchor="end">' + gv + '</text>');
    }

    // Threshold dashed lines
    thresholds.forEach(function(t) {
      var ty = padT + ch * (1 - t.y);
      parts.push('<line x1="' + padL + '" y1="' + ty + '" x2="' + (w - padR) + '" y2="' + ty + '" stroke="' + t.color + '" stroke-width="1" stroke-dasharray="6,4" opacity="0.35"/>');
      parts.push('<text x="' + (w - padR - 4) + '" y="' + (ty - 5) + '" fill="' + t.color + '" font-size="9" font-family="system-ui, sans-serif" text-anchor="end" opacity="0.5">' + t.label + '</text>');
    });

    // Points
    var points = data.map(function(d, idx) {
      var p = typeof d === 'number' ? d : (d.pressure != null ? d.pressure : 0);
      var x = padL + (n > 1 ? idx * xStep : cw / 2);
      var y = padT + ch * (1 - Math.min(1, Math.max(0, p)));
      return { x: x, y: y, p: p };
    });

    // Area fill
    var area = 'M' + points[0].x + ',' + (padT + ch);
    points.forEach(function(pt) { area += ' L' + pt.x + ',' + pt.y; });
    area += ' L' + points[points.length - 1].x + ',' + (padT + ch) + ' Z';
    parts.push('<path d="' + area + '" fill="url(#areaGrad)"/>');

    // Line path
    var line = 'M' + points[0].x + ',' + points[0].y;
    for (var j = 1; j < points.length; j++) {
      line += ' L' + points[j].x + ',' + points[j].y;
    }
    parts.push('<path d="' + line + '" fill="none" stroke="#ff2d78" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>');

    // Dot on last point with glow
    if (points.length > 0) {
      var last = points[points.length - 1];
      var lc = pressureColor(last.p);
      parts.push('<circle cx="' + last.x + '" cy="' + last.y + '" r="6" fill="' + lc + '" opacity="0.2"/>');
      parts.push('<circle cx="' + last.x + '" cy="' + last.y + '" r="3.5" fill="' + lc + '"/>');
    }

    // Dots for recent points
    var dotStart = Math.max(0, points.length - 30);
    for (var k = dotStart; k < points.length - 1; k++) {
      var pt = points[k];
      parts.push('<circle cx="' + pt.x + '" cy="' + pt.y + '" r="2" fill="' + pressureColor(pt.p) + '" opacity="0.6"/>');
    }

    // X-axis labels
    var labelCount = Math.min(8, n);
    if (labelCount > 1) {
      for (var li = 0; li < labelCount; li++) {
        var labelIdx = Math.round(li * (n - 1) / (labelCount - 1));
        var lx = padL + (n > 1 ? labelIdx * xStep : cw / 2);
        parts.push('<text x="' + lx + '" y="' + (h - 6) + '" fill="#444" font-size="9" font-family="monospace" text-anchor="middle">#' + (labelIdx + 1) + '</text>');
      }
    }

    svg.innerHTML = parts.join('');
  }

  // --- Render: Findings ---
  function renderFindings(data) {
    var el = document.getElementById('findings-list');
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="empty-state">No findings</div>';
      return;
    }

    el.innerHTML = data.map(function(f) {
      var prio = (f.priority || f.severity || 'info').toLowerCase();
      var cls = (prio.includes('crit') || prio.includes('high')) ? 'critical' :
                (prio.includes('import') || prio.includes('med') || prio.includes('warn')) ? 'important' : 'info';
      return '<div class="finding-item ' + cls + '">' +
        '<div class="finding-priority ' + cls + '">' + esc(cls) + '</div>' +
        '<div>' + esc(f.message || f.description || f.title || '') + '</div>' +
      '</div>';
    }).join('');
  }

  // --- Render: Actions Table ---
  function renderActions(data) {
    var tbody = document.querySelector('#actions-table tbody');
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No actions</td></tr>';
      return;
    }

    tbody.innerHTML = data.slice(0, 50).map(function(a) {
      var status = a.error
        ? '<span class="status-err">&#9679; error</span>'
        : '<span class="status-ok">&#9679; ok</span>';
      var tokens = a.token_count != null ? a.token_count : (a.tokens != null ? a.tokens : '--');
      return '<tr>' +
        '<td>' + esc(a.tool_name || a.tool || '--') + '</td>' +
        '<td>' + status + '</td>' +
        '<td>' + esc(tokens) + '</td>' +
        '<td>' + timeAgo(a.timestamp) + '</td>' +
      '</tr>';
    }).join('');
  }

  // --- Render: Audit Log ---
  function renderAudit(data) {
    var el = document.getElementById('audit-log');
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="empty-state">No entries</div>';
      return;
    }

    el.innerHTML = data.slice(0, 100).map(function(entry) {
      var ts = entry.timestamp || entry.time || '';
      var t = ts ? new Date(typeof ts === 'number' ? (ts > 1e12 ? ts : ts * 1000) : ts) : null;
      var timeStr = (t && !isNaN(t)) ? t.toLocaleTimeString('en-US', { hour12: false }) : '--:--:--';
      var agent = entry.agent_id || entry.agent || '';
      return '<div class="audit-entry">' +
        '<span class="audit-time">' + esc(timeStr) + '</span>' +
        (agent ? '<span class="audit-agent">' + esc(agent) + '</span>' : '') +
        '<span class="audit-msg">' + esc(entry.message || entry.event || entry.description || '') + '</span>' +
      '</div>';
    }).join('');
  }

  // --- Render: Sessions ---
  function renderSessions(data) {
    var tbody = document.querySelector('#sessions-table tbody');
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No sessions</td></tr>';
      return;
    }

    tbody.innerHTML = data.slice(0, 30).map(function(s) {
      var mp = s.max_pressure != null ? s.max_pressure : (s.peak_pressure != null ? s.peak_pressure : null);
      var ec = s.error_count != null ? s.error_count : (s.errors != null ? s.errors : '--');
      return '<tr>' +
        '<td>' + esc(s.agent_id || s.agent || '--') + '</td>' +
        '<td>' + formatDuration(s.duration || s.duration_sec) + '</td>' +
        '<td style="color:' + (mp != null ? pressureColor(mp) : 'inherit') + '">' + (mp != null ? fmt(mp * 100, 1) + '%' : '--') + '</td>' +
        '<td>' + esc(ec) + '</td>' +
      '</tr>';
    }).join('');
  }

  // --- Render: Patterns ---
  function renderPatterns(data) {
    var el = document.getElementById('pattern-list');
    if (!data || (Array.isArray(data) && data.length === 0) || (typeof data === 'object' && !Array.isArray(data) && Object.keys(data).length === 0)) {
      el.innerHTML = '<div class="empty-state">No patterns detected</div>';
      return;
    }

    var items = Array.isArray(data) ? data : Object.entries(data).map(function(pair) {
      var obj = typeof pair[1] === 'object' ? pair[1] : { description: String(pair[1]) };
      obj.name = pair[0];
      return obj;
    });

    if (items.length === 0) {
      el.innerHTML = '<div class="empty-state">No patterns detected</div>';
      return;
    }

    el.innerHTML = items.slice(0, 20).map(function(p) {
      var sev = (p.severity || p.level || 'low').toLowerCase();
      var sc = (sev.includes('high') || sev.includes('crit')) ? 'high' :
               (sev.includes('med') || sev.includes('warn')) ? 'medium' : 'low';
      return '<div class="pattern-item">' +
        '<div class="pattern-head">' +
          '<span class="pattern-name">' + esc(p.name || p.pattern || p.type || 'Unknown') + '</span>' +
          '<span class="severity-badge severity-' + sc + '">' + esc(sc) + '</span>' +
        '</div>' +
        '<div class="pattern-desc">' + esc(p.description || p.message || p.detail || '') + '</div>' +
      '</div>';
    }).join('');
  }

  // --- Overall Status ---
  function updateOverallStatus() {
    if (!agents || agents.length === 0) {
      document.getElementById('overall-status').textContent = 'No Agents';
      document.getElementById('overall-status').style.color = 'var(--text-muted)';
      document.getElementById('status-dot').className = 'status-dot';
      return;
    }

    var maxP = 0;
    agents.forEach(function(a) {
      if (a.pressure != null && a.pressure > maxP) maxP = a.pressure;
    });

    var dot = document.getElementById('status-dot');
    var label = document.getElementById('overall-status');

    if (maxP >= 0.75) {
      dot.className = 'status-dot error';
      label.textContent = 'Critical';
      label.style.color = 'var(--error)';
    } else if (maxP >= 0.50) {
      dot.className = 'status-dot warn';
      label.textContent = 'Elevated';
      label.style.color = 'var(--warning)';
    } else {
      dot.className = 'status-dot';
      label.textContent = 'Nominal';
      label.style.color = 'var(--success)';
    }
  }

  // --- Fetch Agent Detail ---
  async function fetchAgentDetail() {
    if (!selectedAgentId) {
      renderChart(trajectory);
      return;
    }

    var enc = encodeURIComponent(selectedAgentId);
    var results = await Promise.all([
      api('/api/agent/' + enc + '/trajectory'),
      api('/api/agent/' + enc + '/actions'),
      api('/api/agent/' + enc + '/quality')
    ]);

    var traj = results[0];
    var actions = results[1];
    var quality = results[2];

    if (traj) {
      trajectory = Array.isArray(traj) ? traj : (traj.trajectory || traj.data || []);
    }
    renderChart(trajectory);
    renderActions(Array.isArray(actions) ? actions : (actions && actions.actions ? actions.actions : []));

    if (quality) {
      var agent = agents.find(function(a) { return a.agent_id === selectedAgentId; });
      if (agent) {
        agent.quality_grade = quality.grade || quality.quality_grade;
        renderAgents(agents);
      }
    }
  }

  // --- Main Fetch Loop ---
  async function fetchAll() {
    var results = await Promise.all([
      api('/api/agents'),
      api('/api/findings'),
      api('/api/audit'),
      api('/api/sessions'),
      api('/api/fingerprints'),
      api('/api/engine')
    ]);

    var agentData = results[0];
    var findings = results[1];
    var audit = results[2];
    var sessions = results[3];
    var fingerprints = results[4];
    var engine = results[5];

    // Agents
    if (agentData) {
      agents = Array.isArray(agentData) ? agentData : (agentData.agents || []);

      // Merge engine state
      if (engine && engine.agents) {
        var ea = engine.agents;
        agents.forEach(function(a) {
          var e = ea[a.agent_id];
          if (e) {
            if (a.pressure == null && e.pressure != null) a.pressure = e.pressure;
            if (!a.vitals && e.vitals) a.vitals = e.vitals;
            if (!a.mode && e.mode) a.mode = e.mode;
          }
        });
      }

      renderAgents(agents);
      updateOverallStatus();
    }

    // Chart + actions
    if (!selectedAgentId) {
      if (engine && engine.trajectory) {
        trajectory = engine.trajectory;
      } else if (agents.length > 0 && agents[0].agent_id) {
        var t = await api('/api/agent/' + encodeURIComponent(agents[0].agent_id) + '/trajectory');
        if (t) trajectory = Array.isArray(t) ? t : (t.trajectory || t.data || []);
      }
      renderChart(trajectory);

      if (agents.length > 0 && agents[0].agent_id) {
        var act = await api('/api/agent/' + encodeURIComponent(agents[0].agent_id) + '/actions');
        renderActions(Array.isArray(act) ? act : (act && act.actions ? act.actions : []));
      }
    } else {
      await fetchAgentDetail();
    }

    // Findings
    renderFindings(Array.isArray(findings) ? findings : (findings && findings.findings ? findings.findings : []));

    // Audit
    var auditList = Array.isArray(audit) ? audit :
      (audit && audit.entries ? audit.entries : (audit && audit.log ? audit.log : []));
    renderAudit(auditList);

    // Sessions
    renderSessions(Array.isArray(sessions) ? sessions : (sessions && sessions.sessions ? sessions.sessions : []));

    // Patterns
    renderPatterns(fingerprints);
  }

  // --- Start ---
  fetchAll();
  setInterval(fetchAll, 2000);

})();
</script>
</body>
</html>
